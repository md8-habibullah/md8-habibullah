# Sample workflow for building and deploying a Next.js site to GitHub Pages
#
# This version is customized to FORCE NPM usage and deploy from the 'latest/' subdirectory.
#
name: Deploy Next.js site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. CLEANUP: Delete pnpm-lock.yaml to force NPM usage
      - name: Clean up pnpm lockfile
        run: rm -f latest/pnpm-lock.yaml
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm' # Hardcode cache to npm
          cache-dependency-path: latest/package.json
          
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next
          
      # 🛑 CRITICAL FIX: Add --legacy-peer-deps to ignore React 19 conflict
      - name: Install dependencies (NPM)
        working-directory: latest 
        run: npm install --legacy-peer-deps
        
      - name: Build with Next.js (Static Export)
        working-directory: latest 
        run: npx next build
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Path to the final static output folder
          path: ./latest/out 

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4